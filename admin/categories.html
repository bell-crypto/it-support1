<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>จัดการหัวข้อหลัก | IT Support Center</title>

  <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-top">
      <button class="hamburger" id="toggleSidebar">☰</button>

      <div class="brand-text">
        <h2>IT Support</h2>
        <p>Admin Panel</p>
      </div>
    </div>

    <nav class="menu">

      <a href="dashboard.html">
        <span class="menu-icon">📊</span>
        <span class="menu-text">Dashboard</span>
      </a>

      <a href="categories.html">
        <span class="menu-icon">📁</span>
        <span class="menu-text">หัวข้อหลัก</span>
      </a>

      <a href="article_form.html">
        <span class="menu-icon">⚠️</span>
        <span class="menu-text">ปัญหา</span>
      </a>

      <a href="../index.html">
        <span class="menu-icon">🌐</span>
        <span class="menu-text">กลับไปหน้า User</span>
      </a>

      <a href="settings.html">
        <span class="menu-icon">⚙️</span>
        <span class="menu-text">ตั้งค่า</span>
      </a>

      <a href="#" id="logoutBtn">
        <span class="menu-icon">🚪</span>
        <span class="menu-text">ออกจากระบบ</span>
      </a>

    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <div>
        <h1>หัวข้อหลัก</h1>
        <p>จัดการ Category สำหรับหน้า Flowchart</p>
      </div>

      <div class="admin-user">
        Admin
      </div>

    </header>

    <!-- CONTENT -->
    <section class="content">

      <div class="panel">

        <!-- HEADER -->
        <div class="panel-header">

          <h2>รายการหัวข้อหลัก</h2>

          <button class="add-btn" id="openFormBtn">
            + เพิ่มหัวข้อหลัก
          </button>

        </div>

        <!-- FORM -->
        <div class="form-box" id="categoryFormBox">

          <input type="hidden" id="categoryId">

          <div class="form-grid">

            <div>
              <label>ชื่อหัวข้อ</label>

              <input
                type="text"
                id="title"
                placeholder="เช่น Printer"
              >
            </div>

            <div>
              <label>สี</label>

              <input
                type="color"
                id="color"
                value="#dc2626"
              >
            </div>

            <div>
              <label>ลำดับ</label>

              <input
                type="number"
                id="sortOrder"
                value="1"
                readonly
              >
            </div>

          </div>

          <div style="margin-top:14px;">

            <label>รายละเอียด</label>

            <textarea
              id="description"
              placeholder="รายละเอียดหัวข้อ"
            ></textarea>

          </div>

          <div class="form-actions">

            <button class="save-btn" id="saveBtn">
              บันทึก
            </button>

            <button class="cancel-btn" id="cancelBtn">
              ยกเลิก
            </button>

          </div>

        </div>

        <!-- TABLE -->
        <table>

          <thead>
            <tr>
              <th>หัวข้อ</th>
              <th>รายละเอียด</th>
              <th>สี</th>
              <th>ลำดับ</th>
              <th>สถานะ</th>
              <th>จัดการ</th>
            </tr>
          </thead>

          <tbody id="categoryTable"></tbody>

        </table>

      </div>

    </section>

  </main>

</div>

<script src="../js/admin.js"></script>
<script src="../js/categories.js"></script>

</body>
</html>
